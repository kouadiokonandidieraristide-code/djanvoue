<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Djanvouê - Flash Express</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f0f2f5; }
        /* Ton bandeau bleu Djanvouê */
        .header { background-color: #1a3a8a; color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .logo-section { display: flex; align-items: center; }
        .logo-circle { width: 40px; height: 40px; background: #f39c12; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 10px; }
        /* Menu de navigation blanc */
        .nav-tabs { background: white; display: flex; justify-content: space-around; padding: 10px 0; border-bottom: 1px solid #ddd; font-size: 0.8em; }
        .tab { text-align: center; color: #555; }
        /* Cartes des chauffeurs */
        .container { padding: 15px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid #1a3a8a; }
        .card h3 { margin: 0 0 10px 0; color: #1a3a8a; }
        .price-tag { background: #e8f0fe; color: #1a3a8a; padding: 5px 10px; border-radius: 20px; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-section">
            <div class="logo-circle">D</div>
            <div>
                <div style="font-weight: bold; letter-spacing: 1px;">DJANVOUÊ</div>
                <div style="font-size: 0.6em;">Flash Express Moronou - 24H/24</div>
            </div>
        </div>
        <div style="background: #f39c12; padding: 3px 8px; border-radius: 5px; font-size: 0.7em;">22:40</div>
    </div>

    <div class="nav-tabs">
        <div class="tab">👤<br>Client</div>
        <div class="tab">🚖<br>Taxi</div>
        <div class="tab">🏪<br>Vendeur</div>
        <div class="tab">🤝<br>Accord</div>
        <div class="tab">🏢<br>Bureau</div>
    </div>

    <div class="container" id="liste-taxis">
        <!-- Tes chauffeurs Firebase s'afficheront ici avec le nouveau look -->
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://djanvoue-ddr-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('TAXI').on('value', (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('liste-taxis');
            container.innerHTML = ""; 
            if (data) {
                Object.keys(data).forEach(key => {
                    const taxi = data[key];
                    container.innerHTML += `
                        <div class="card">
                            <h3>🚕 Chauffeur : ${taxi.nom || 'En attente...'}</h3>
                            <p><strong>Lieu :</strong> ${taxi.lieu || 'Moronou'}</p>
                            <div class="price-tag">${taxi.prix || '---'} FCFA</div>
                        </div>`;
                });
            }
        });
    </script>
</body>
</html>
